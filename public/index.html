<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickShare</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    #acceptBtn {
      display: none;
      margin-top: 10px;
      background: #28a745;
      width: 100%;
      padding: 12px;
      font-size: 15px;
    }
    #acceptBtn:hover { background: #218838; }
  </style>
</head>
<body>
  <div class="container">

    <h1>⚡ QuickShare</h1>

    <div id="connectionStatus">❌ Not Connected</div>

    <div class="card">
      <input id="room" placeholder="Enter Room ID" />
      <button id="join">Join Room</button>
    </div>

    <div class="card">
      <label style="font-size:13px;color:#aaa;display:block;margin-bottom:8px;">
        Select a file to send
      </label>
      <input type="file" id="file" />
    </div>

    <div class="card">
      <div id="status">Waiting for file...</div>
      <progress id="progressBar" value="0" max="100"></progress>
      <button id="acceptBtn">💾 Accept & Save</button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
